# GitHub Actions — Deployment Workflow

Conditional deployment based on repository archetype: Library (publish JAR to GitHub Packages), Pipeline (Docker → Artifact Registry → Cloud Run), Config (sync configs to GCS).

**Prerequisites:** Workload Identity Federation configured, GitHub Environments (dev, staging, production with protection rules), Artifact Registry repository created.

Replace all PLACEHOLDER values before use.

---

## Trigger

```yaml
name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']  # Library repos trigger on version tags

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false
```

---

## Job: detect-archetype

Determines repo type via file presence: Dockerfile → pipeline, prompt-config/ → config, else → library.

```yaml
jobs:
  detect-archetype:
    runs-on: ubuntu-latest
    outputs:
      archetype: ${{ steps.detect.outputs.archetype }}
    steps:
      - uses: actions/checkout@v4.2.2
      - id: detect
        run: |
          if [ -f "Dockerfile" ]; then
            echo "archetype=pipeline" >> $GITHUB_OUTPUT
          elif [ -d "prompt-config" ]; then
            echo "archetype=config" >> $GITHUB_OUTPUT
          else
            echo "archetype=library" >> $GITHUB_OUTPUT
          fi
```

---

## Job: publish-library

**When to use:** Library repos on version tags (v*).

Publishes JAR to GitHub Packages via sbt.

```yaml
  publish-library:
    needs: detect-archetype
    if: needs.detect-archetype.outputs.archetype == 'library' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1
      - name: Publish to GitHub Packages
        run: sbt publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

