# Cloud Run Job Definition

**Deploy:** `gcloud run jobs replace cloud-run-job.yaml --region=us-central1`

**Replace placeholders:** `PLACEHOLDER_JOB_NAME`, `PLACEHOLDER_COMPONENT`, `PLACEHOLDER_ENV`, `PLACEHOLDER_IMAGE`, `PLACEHOLDER_TAG`

```yaml
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: PLACEHOLDER_JOB_NAME
  labels:
    app: repcheck
    component: PLACEHOLDER_COMPONENT
  annotations:
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      labels:
        app: repcheck
        component: PLACEHOLDER_COMPONENT
    spec:
      template:
        spec:
          containers:
            - image: us-central1-docker.pkg.dev/repcheck-PLACEHOLDER_ENV/repcheck-images/PLACEHOLDER_IMAGE:PLACEHOLDER_TAG
              resources:
                limits:
                  cpu: "2"
                  memory: 2Gi
              env:
                - name: GOOGLE_CLOUD_PROJECT
                  value: repcheck-PLACEHOLDER_ENV
                # ALLOYDB_URL injected via config (see config-pattern.scala)
                # - name: ALLOYDB_URL
                #   value: "jdbc:postgresql://PLACEHOLDER_ALLOYDB_HOST:5432/repcheck"
                # Pipeline-specific vars: CONGRESS_GOV_API_KEY, ANTHROPIC_API_KEY, SNAPSHOT_PATH
          serviceAccountName: repcheck-pipeline-sa@repcheck-PLACEHOLDER_ENV.iam.gserviceaccount.com
          timeoutSeconds: 3600
          maxRetries: 1
```

**Resources:** 2 CPU / 2Gi default; adjust per pipeline (ingestion ↓, LLM analysis ↑)

**Timeout:** 3600s (1 hour); bills/votes ~30min, LLM ~1hr, scoring ~15-30min

**Retry:** maxRetries=1 is infrastructure safety net; app handles internal retry via RetryWrapper (exponential backoff)

