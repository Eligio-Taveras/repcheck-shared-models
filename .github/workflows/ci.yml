name: CI

on:
  push:
    branches: [main, "feature/**", "claude/**"]
  pull_request:
    branches: [main, "feature/**", "claude/**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting (Scalafmt)
        run: sbt scalafmtCheckAll

      - name: Compile (includes WartRemover + tpolecat checks)
        run: sbt compile

      - name: Check Scalafix rules
        run: sbt "scalafixAll --check"

      - name: Run tests with coverage
        run: sbt coverage test coverageReport

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  doc-generator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install sbt
        uses: sbt/setup-sbt@v1

      - name: Compile doc generator
        run: sbt docGenerator/compile

      - name: Run doc generator tests
        run: sbt docGenerator/test
